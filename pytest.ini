# Parity tests live in python.py (one per example folder), not test_*.py.
# This lets `pytest examples/chapter01/` discover them by directory.
[pytest]
python_files = python.py test_*.py
# Every example's test file is named python.py; importlib mode imports each
# under a unique, path-based name so same-basename files don't collide.
addopts = --import-mode=importlib
